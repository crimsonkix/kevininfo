<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Info</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #010101;
      background: radial-gradient(circle at 35% 25%, #0a0a0a, #000000);
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Poppins', sans-serif;
      padding: 1.5rem;
    }

    .rgb-core {
      display: inline-block;
      background: transparent;
      padding: 1.8rem 2.2rem;
      border-radius: 2rem;
      border: none;
      box-shadow: none;
      text-align: center;
      max-width: 95vw;
    }

    .rgb-phrase {
      display: block;
      font-size: clamp(1.8rem, 7vw, 3.9rem);
      font-weight: 620;
      letter-spacing: -0.01em;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
      color: #ffffff;
      animation: rgbGlowShift 5s ease-in-out infinite;
      text-rendering: optimizeLegibility;
    }

    @keyframes rgbGlowShift {
      0% {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5);
        color: #fff0f0;
      }
      20% {
        text-shadow: 0 0 7px rgba(255, 0, 0, 0.9), 0 0 16px rgba(255, 50, 0, 0.6);
        color: #fff2f2;
      }
      40% {
        text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 18px rgba(0, 200, 0, 0.6);
        color: #f0fff0;
      }
      60% {
        text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 20px rgba(0, 255, 100, 0.7);
        color: #f0fff2;
      }
      80% {
        text-shadow: 0 0 9px rgba(0, 100, 255, 0.9), 0 0 20px rgba(0, 80, 255, 0.7);
        color: #f0f2ff;
      }
      100% {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5);
        color: #fff0f0;
      }
    }

    .rgb-core {
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .rgb-core:hover {
      transform: scale(1.01);
    }

    @media (max-width: 550px) {
      .rgb-core {
        padding: 1.2rem 1.4rem;
        border-radius: 1.5rem;
      }
    }

    html {
      background-color: #000;
    }
  </style>
</head>
<body>
  <div class="rgb-core">
    <span class="rgb-phrase">Vous en savez plus sur moi ?</span>
  </div>
</body>
</html>
