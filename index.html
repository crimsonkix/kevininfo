<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Info</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 35% 25%, #0a0a0a, #000000);
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
      cursor: pointer;
    }

    .rgb-core {
      display: inline-block;
      padding: 1.8rem 2.2rem;
      border-radius: 2rem;
      text-align: center;
      max-width: 95vw;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .rgb-core:hover {
      transform: scale(1.01);
    }

    .rgb-phrase {
      display: block;
      font-size: clamp(1.8rem, 7vw, 3.9rem);
      font-weight: 620;
      letter-spacing: -0.01em;
      line-height: 1.35;
      color: #ffffff;
      animation: rgbGlowShift 5s ease-in-out infinite;
    }

    @keyframes rgbGlowShift {
      0% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5); }
      20% { text-shadow: 0 0 7px rgba(255, 0, 0, 0.9), 0 0 16px rgba(255, 50, 0, 0.6); }
      40% { text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 18px rgba(0, 200, 0, 0.6); }
      60% { text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 20px rgba(0, 255, 100, 0.7); }
      80% { text-shadow: 0 0 9px rgba(0, 100, 255, 0.9), 0 0 20px rgba(0, 80, 255, 0.7); }
      100% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5); }
    }

    @media (max-width: 550px) {
      .rgb-core { padding: 1.2rem 1.4rem; border-radius: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="rgb-core">
    <span class="rgb-phrase">Vous en savez plus sur moi ?</span>
  </div>

  <audio id="bgMusic" loop preload="auto" autoplay muted>
    <source src="https://cdn.soundworldz.com/songs/FR4y0v_C/FUNK_SERENO.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('bgMusic');
    let unmuted = false;
    let wasPlaying = false;

    // Unmute on first user click anywhere (no button)
    function enableSound() {
      if (!unmuted) {
        audio.muted = false;
        audio.play().catch(() => {});
        unmuted = true;
        document.body.removeEventListener('click', enableSound);
        document.body.removeEventListener('touchstart', enableSound);
        document.body.style.cursor = 'default';
      }
    }

    document.body.addEventListener('click', enableSound);
    document.body.addEventListener('touchstart', enableSound);

    // Pause when leaving tab, resume when back (if it was playing)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (!audio.paused && unmuted) {
          wasPlaying = true;
          audio.pause();
        }
      } else {
        if (wasPlaying && unmuted) {
          audio.play().catch(() => {});
          wasPlaying = false;
        }
      }
    });
  </script>
</body>
</html>
