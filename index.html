<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kevin Info + Phonk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 35% 25%, #0a0a0a, #000000);
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
      position: relative;
    }

    .toggle-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #111;
      border: 1px solid rgba(255, 0, 255, 0.5);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      z-index: 1000;
    }

    .toggle-btn:hover {
      background: #ff00aa20;
      box-shadow: 0 0 12px #ff00aa;
      border-color: #ff00aa;
    }

    .rgb-core {
      display: inline-block;
      background: transparent;
      padding: 1.8rem 2.2rem;
      border-radius: 2rem;
      text-align: center;
      max-width: 95vw;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .rgb-core:hover {
      transform: scale(1.01);
    }

    .rgb-phrase {
      display: block;
      font-size: clamp(1.8rem, 7vw, 3.9rem);
      font-weight: 620;
      letter-spacing: -0.01em;
      line-height: 1.35;
      color: #ffffff;
      animation: rgbGlowShift 5s ease-in-out infinite;
    }

    @keyframes rgbGlowShift {
      0% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5); }
      20% { text-shadow: 0 0 7px rgba(255, 0, 0, 0.9), 0 0 16px rgba(255, 50, 0, 0.6); }
      40% { text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 18px rgba(0, 200, 0, 0.6); }
      60% { text-shadow: 0 0 8px rgba(0, 255, 0, 0.9), 0 0 20px rgba(0, 255, 100, 0.7); }
      80% { text-shadow: 0 0 9px rgba(0, 100, 255, 0.9), 0 0 20px rgba(0, 80, 255, 0.7); }
      100% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 12px rgba(255, 0, 0, 0.5); }
    }

    @media (max-width: 550px) {
      .rgb-core { padding: 1.2rem 1.4rem; border-radius: 1.5rem; }
      .toggle-btn { top: 0.7rem; right: 0.7rem; padding: 0.5rem 1rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <button class="toggle-btn" id="musicToggle">🔊 MUSIC ON</button>

  <div class="rgb-core">
    <span class="rgb-phrase">Vous en savez plus sur moi ?</span>
  </div>

  <!-- Your exact song link -->
  <audio id="phonkAudio" loop preload="auto">
    <source src="https://cdn.soundworldz.com/songs/FR4y0v_C/FUNK_SERENO.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('phonkAudio');
    const toggleBtn = document.getElementById('musicToggle');
    let isPlaying = false;
    let userInteracted = false;

    // Optional: log if the link fails to load (no alert, just quiet)
    audio.addEventListener('error', () => {
      console.warn("⚠️ Song failed to load. Check if the URL is accessible and allows CORS.");
    });

    function startMusic() {
      if (!userInteracted) {
        audio.play().then(() => {
          isPlaying = true;
          toggleBtn.textContent = '🔇 MUSIC OFF';
          userInteracted = true;
        }).catch(err => {
          console.log("Click the button to start music (browser policy).");
        });
      }
    }

    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      
      if (!userInteracted) {
        audio.play().then(() => {
          isPlaying = true;
          toggleBtn.textContent = '🔇 MUSIC OFF';
          userInteracted = true;
        }).catch(err => {
          console.error("Playback failed. The server might block audio requests.", err);
          alert("Cannot play song – the link might not allow direct playback. Try a different MP3 URL.");
        });
      } else {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
          toggleBtn.textContent = '🔊 MUSIC ON';
        } else {
          audio.play().then(() => {
            isPlaying = true;
            toggleBtn.textContent = '🔇 MUSIC OFF';
          }).catch(err => console.log(err));
        }
      }
    });

    document.body.addEventListener('click', (e) => {
      if (e.target === toggleBtn) return;
      if (!userInteracted) startMusic();
    });

    let wasPlayingBeforeHide = false;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (userInteracted && !audio.paused) {
          wasPlayingBeforeHide = true;
          audio.pause();
        }
      } else {
        if (wasPlayingBeforeHide && userInteracted) {
          audio.play().catch(() => {});
          isPlaying = true;
          toggleBtn.textContent = '🔇 MUSIC OFF';
          wasPlayingBeforeHide = false;
        }
      }
    });

    audio.addEventListener('ended', () => {
      if (userInteracted) {
        isPlaying = false;
        toggleBtn.textContent = '🔊 MUSIC ON';
      }
    });
  </script>
</body>
</html>
